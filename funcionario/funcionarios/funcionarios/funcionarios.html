<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Bil — Equipe</title>
    <link rel="stylesheet" href="funcionarios.css">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="titulo"><h1>Black Bil</h1></div>
        <div class="logo"><img src="../../src/logo.jpg" alt="Logo Black Bil"></div>
        <button class="btn-perfil" id="btn-perfil" title="Minha foto de perfil">
            <img class="perfil-foto" id="perfil-foto" alt="">
            <span class="perfil-inicial" id="perfil-inicial"></span>
        </button>
        <input type="file" id="input-foto-perfil" accept="image/*" style="display:none">
        <button class="hamburger" id="hamburger" aria-label="Abrir menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav id="nav-menu">
            <ul>
                <li><a href="../agenda/agenda.html">Agenda</a></li>
                <li><a href="../servicos/servico.html">Serviços</a></li>
                <li><a href="#" class="nav-ativo">Equipe</a></li>
                <li><button class="nav-sair" id="btn-sair" type="button">Sair</button></li>
            </ul>
        </nav>
    </header>

    <main class="container">

        <div class="page-header">
            <h2 class="page-titulo">Equipe</h2>
            <button class="btn-adicionar" id="btn-adicionar">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Novo funcionário
            </button>
        </div>

        <div class="funcionarios-lista" id="funcionarios-lista"></div>

    </main>

    <!-- Modal novo funcionário -->
    <div class="modal-overlay escondido" id="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h3>Novo Funcionário</h3>
                <button class="modal-fechar" id="modal-fechar" aria-label="Fechar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <form id="form-funcionario">
                <div class="campo">
                    <label for="input-nome">Nome</label>
                    <input type="text" id="input-nome" placeholder="Ex: João Silva" required>
                </div>
                <div class="campo">
                    <label for="input-email">E-mail</label>
                    <input type="email" id="input-email" placeholder="funcionario@blackbil.com" required>
                </div>
                <div class="campo">
                    <label for="input-senha">Senha</label>
                    <input type="password" id="input-senha" placeholder="Senha de acesso" required>
                </div>
                <div class="campo">
                    <label for="input-role">Perfil</label>
                    <select id="input-role" required>
                        <option value="funcionario">Funcionário</option>
                        <option value="proprietario">Proprietário</option>
                    </select>
                </div>
                <p class="erro-form escondido" id="erro-form"></p>
                <div class="modal-acoes">
                    <button type="button" class="btn-cancelar" id="btn-cancelar">Cancelar</button>
                    <button type="submit" class="btn-salvar">Criar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../api.js"></script>
    <script src="funcionarios.js"></script>
</body>
</html>
