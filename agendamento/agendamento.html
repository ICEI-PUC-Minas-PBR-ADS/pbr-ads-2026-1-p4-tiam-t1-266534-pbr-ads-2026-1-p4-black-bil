<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Bil</title>
    <!--CSS-->
    <link rel="stylesheet" href="agendamento.css">
    <link rel="stylesheet" href="/pbr-ads-2026-1-p4-tiam-t1-266534-pbr-ads-2026-1-p4-black-bil-main/header/header.css">
    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!--Header-->
    <header>
        <div class="titulo">
            <h1>Black Bil</h1>
        </div>
        <div class="logo">
            <img src="/pbr-ads-2026-1-p4-tiam-t1-266534-pbr-ads-2026-1-p4-black-bil-main/src/header/logo.jpg" alt="Logo Black Bil">
        </div>

        <nav>
            <ul>
                <li><a href="#">Início</a></li>
                <li><a href="#">Agendamentos</a></li>
                <li><a href="#">Produtos</a></li>
            </ul>
        </nav>

    </header>

    <!--Section-->
    <section class="servicos">

    <h2>Escolha um serviço</h2>
    <!--Corte Curto-->
    <div class="grupo-servico">

        <div class="titulo-servico">Corte Curto</div>

        <div class="opcoes-servico">
            <label>
                <img src="/pbr-ads-2026-1-p4-tiam-t1-266534-pbr-ads-2026-1-p4-black-bil-main/src/agendamento/corte curto.jpeg" alt="foto curto">
                <input type="radio" name="servico">
                Corte simples — R$ 35,00
            </label>

            <label>
                <input type="radio" name="servico">
                Corte + Barba — R$ 69,00
            </label>
        </div>

        </div>

        <!--Corte Longo-->
    <div class="grupo-servico">

        <div class="titulo-servico">Corte Longo</div>

        <div class="opcoes-servico">
            <label>
                <img src="/pbr-ads-2026-1-p4-tiam-t1-266534-pbr-ads-2026-1-p4-black-bil-main/src/agendamento/corte longo.jpeg" alt="foto curto">
                <input type="radio" name="servico">
                Corte simples — R$ 35,00
            </label>

            <label>
                <input type="radio" name="servico">
                Corte + Barba — R$ 69,00
            </label>
        </div>

    </div>

        <!--Rosto-->
    <div class="grupo-servico">

        <div class="titulo-servico">Rosto</div>

        <div class="opcoes-servico">
            <label>
                <input type="radio" name="servico">
                Barba — R$ 35,00
            </label>

            <label>
                <input type="radio" name="servico">
                Barba + sobrancelha — R$ 40,00
            </label>
        </div>

    </div>

    </section>
</body>
</html>
